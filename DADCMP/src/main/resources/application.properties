# ----------------------------
# APPLICATION
# ----------------------------
spring.application.name=DADCMP
server.port=8080

# ----------------------------
# DATABASE (MySQL)
# ----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/dadcmp
spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------
# JPA / HIBERNATE
# ----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ----------------------------
# LOGGING (Optional but useful)
# ----------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ----------------------------
# JWT CONFIGURATION
# ----------------------------
jwt.secret=mysecretkeymysecretkeymysecretkey123
jwt.expiration=3600000

# ----------------------------
# ERROR HANDLING
# ----------------------------
server.error.include-message=always
server.error.include-binding-errors=always

# ----------------------------
# CORS (Handled in SecurityConfig)
# ----------------------------
# No need to define here if already configured in code